<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Edad</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="edad-actual-page">
    <header class="header">
        <h1 class="logo">Calculadora</h1>
        <ul class="menu">
            <li><a href="index.html">inicio</a></li>
            <li><a href="Calculadora.html">Calculadora</a></li>
            <li><a href="EdadActual.html">Calculadora de Edad</a></li>
        </ul>
    </header>

    <main class="edad-actual-container">
        <div class="edad-form-card">
            <label class="form-title">FECHA DE NACIMIENTO</label>
            
            <input 
                type="date" 
                id="fechaNacimiento" 
                class="form-input" 
                placeholder="dd/mm/aaaa"
            >
            
            <button onclick="calcularEdad()" class="btn-calculate">
                Calcular mi edad
            </button>
        </div>

        <div id="resultado" class="resultado-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
